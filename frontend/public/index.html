<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>H&CO. Invoices</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#185FA5"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
</head>
<body>

<div id="toast"></div>
<div id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">H<span class="logo-amp">&</span>CO.<span class="logo-sub">invoices</span></div>
      <button class="icon-btn sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="new" onclick="navTo('new')"><span class="nav-icon">＋</span> New Invoice</button>
      <button class="nav-item" data-view="list" onclick="navTo('list')"><span class="nav-icon">☰</span> All Invoices</button>
      <button class="nav-item" data-view="dashboard" onclick="navTo('dashboard')"><span class="nav-icon">◎</span> Dashboard</button>
    </nav>
    <div class="sidebar-section-label">RECENT</div>
    <div class="recent-list" id="recent-list"></div>
    <div class="sidebar-bottom">
      <div class="company-card">
        <div class="company-name">H&amp;CO.</div>
        <div class="company-addr">Canal Road Jallo, Lahore</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn" onclick="openSidebar()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect y="2" width="18" height="2" rx="1" fill="currentColor"/><rect y="8" width="18" height="2" rx="1" fill="currentColor"/><rect y="14" width="18" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">New Invoice</span>
      <div style="width:36px"></div>
    </header>

    <!-- NEW / EDIT -->
    <section class="view active" id="view-new">
      <div class="view-header">
        <h1 id="form-heading">New Invoice</h1>
        <div class="view-actions">
          <button class="btn btn-ghost" onclick="resetForm()">Clear</button>
          <button class="btn btn-secondary" onclick="saveInvoice()" id="save-btn">Save</button>
          <button class="btn btn-primary" onclick="exportPDF()" id="pdf-btn">Export PDF</button>
        </div>
      </div>
      <div class="form-body">

        <div class="card">
          <div class="card-title">Invoice details</div>
          <div class="form-grid">
            <div class="fg"><label>Invoice #</label><input id="f-num" placeholder="BILL19"/></div>
            <div class="fg"><label>Status</label>
              <select id="f-status">
                <option value="pending">Pending</option>
                <option value="partial">Partially Paid</option>
                <option value="paid">Paid</option>
              </select>
            </div>
            <div class="fg"><label>Issue date</label><input type="date" id="f-date"/></div>
            <div class="fg"><label>Due date</label><input type="date" id="f-due"/></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Bill to</div>
          <div class="form-grid">
            <div class="fg"><label>Client name</label><input id="f-client-name" placeholder="e.g. NASIR"/></div>
            <div class="fg"><label>Phone</label><input id="f-client-phone" placeholder="0322 4375044" type="tel"/></div>
            <div class="fg fg-full"><label>Company / Location</label><input id="f-client-company" placeholder="e.g. SOZO Water Park"/></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Items</div>
          <div class="items-wrap">
            <div class="items-header">
              <span style="width:80px">Qty</span>
              <span style="flex:1">Description</span>
              <span style="width:110px;text-align:right">Rate (Rs)</span>
              <span style="width:110px;text-align:right">Item price</span>
              <span style="width:32px"></span>
            </div>
            <div id="items-body"></div>
          </div>
          <button class="btn btn-ghost btn-sm add-row-btn" onclick="addRow()">＋ Add row</button>
          <div class="totals-area">
            <div class="total-label">Total</div>
            <div class="total-amount" id="total-display">Rs 0</div>
          </div>
        </div>

        <!-- PAYMENT TRACKING — only shown when editing saved invoice -->
        <div class="card" id="payment-card" style="display:none">
          <div class="card-title-row">
            <div class="card-title">Payment tracking</div>
          </div>

          <!-- Summary boxes -->
          <div class="payment-summary" id="payment-summary"></div>

          <!-- Payment history -->
          <div id="payment-history"></div>

          <!-- Add payment form -->
          <div class="add-payment-form">
            <div class="fg">
              <label>Amount (Rs)</label>
              <input type="number" id="pay-amount" placeholder="e.g. 50000" min="1"/>
            </div>
            <div class="fg">
              <label>Date</label>
              <input type="date" id="pay-date"/>
            </div>
            <div class="fg fg-note">
              <label>Note (optional)</label>
              <input type="text" id="pay-note" placeholder="e.g. Cash payment"/>
            </div>
            <button class="btn btn-success" onclick="addPayment()" style="margin-bottom:1px">＋ Add Payment</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Notes</div>
          <textarea id="f-notes" rows="2" placeholder="Optional notes…"></textarea>
        </div>

        <div class="mobile-actions">
          <button class="btn btn-secondary btn-block" onclick="saveInvoice()">Save invoice</button>
          <button class="btn btn-primary btn-block" onclick="exportPDF()">Export PDF</button>
        </div>
      </div>
    </section>

    <!-- ALL INVOICES -->
    <section class="view" id="view-list">
      <div class="view-header">
        <h1>All Invoices</h1>
        <input class="search-input" id="search-input" placeholder="Search…" oninput="filterList()"/>
      </div>
      <div id="list-body" class="list-body"></div>
    </section>

    <!-- DASHBOARD -->
    <section class="view" id="view-dashboard">
      <div class="view-header"><h1>Dashboard</h1></div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card" style="margin-top:20px">
        <div class="card-title">Pending / Partial payments</div>
        <div id="dash-recent"></div>
      </div>
    </section>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
